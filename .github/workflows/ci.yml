name: Swag Labs Selenium Tests (Docker)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ✅ FIX: Required for junit report
permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Build & Run Containerized Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            --tag swag-labs-tests:${{ github.sha }} \
            --tag swag-labs-tests:latest \
            .

      # 3. Run container (DO NOT remove it yet)
      - name: Run test suite in container
        run: |
          docker run \
            --name test-run \
            swag-labs-tests:latest || true

      # 4. Copy reports from the SAME container
      - name: Extract test reports
        if: always()
        run: |
          docker cp test-run:/app/target/surefire-reports ./surefire-reports || true
          docker rm test-run || true

      # 5. Publish test results (GitHub Checks)
      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'surefire-reports/TEST-*.xml'
          check_name: JUnit Test Results
          fail_on_failure: true

      # 6. Upload reports artifact
      - name: Upload Surefire reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-${{ github.sha }}
          path: surefire-reports/
          retention-days: 14