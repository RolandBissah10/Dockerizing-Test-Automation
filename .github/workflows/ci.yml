name: Swag Labs Selenium Tests (Docker)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Build & Run Containerized Tests
    runs-on: ubuntu-latest

    outputs:
      tests_total:   ${{ steps.parse.outputs.tests_total }}
      tests_passed:  ${{ steps.parse.outputs.tests_passed }}
      tests_failed:  ${{ steps.parse.outputs.tests_failed }}
      tests_skipped: ${{ steps.parse.outputs.tests_skipped }}
      passed_tests:  ${{ steps.parse.outputs.passed_tests }}
      failed_tests:  ${{ steps.parse.outputs.failed_tests }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag swag-labs-tests:${{ github.sha }} \
            --tag swag-labs-tests:latest \
            .

      - name: Run test suite in container
        run: |
          docker run \
            --name test-run \
            --shm-size=2g \
            swag-labs-tests:latest || true

      - name: Extract test reports
        if: always()
        run: |
          docker cp test-run:/app/target/surefire-reports ./surefire-reports || true
          docker rm test-run || true

      - name: Parse surefire test results
        id: parse
        if: always()
        run: |
          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0

          for xml in surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue

            t=$(grep -oP 'tests="\K[0-9]+' "$xml" | head -1 || echo 0)
            f=$(grep -oP 'failures="\K[0-9]+' "$xml" | head -1 || echo 0)
            e=$(grep -oP 'errors="\K[0-9]+' "$xml" | head -1 || echo 0)
            s=$(grep -oP 'skipped="\K[0-9]+' "$xml" | head -1 || echo 0)

            TOTAL=$((TOTAL + t))
            FAILED=$((FAILED + f + e))
            SKIPPED=$((SKIPPED + s))
          done

          PASSED=$((TOTAL - FAILED - SKIPPED))

          echo "tests_total=$TOTAL"     >> "$GITHUB_OUTPUT"
          echo "tests_passed=$PASSED"   >> "$GITHUB_OUTPUT"
          echo "tests_failed=$FAILED"   >> "$GITHUB_OUTPUT"
          echo "tests_skipped=$SKIPPED" >> "$GITHUB_OUTPUT"

          # (Optional) simple summaries
          echo "passed_tests=See GitHub report" >> "$GITHUB_OUTPUT"
          echo "failed_tests=See GitHub report" >> "$GITHUB_OUTPUT"

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'surefire-reports/TEST-*.xml'
          check_name: JUnit Test Results
          fail_on_failure: true

      - name: Upload Surefire reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-${{ github.sha }}
          path: surefire-reports/
          retention-days: 14

  #  Slack Notification Job
  notify-slack:
    needs: test
    if: always()
    uses: ./.github/workflows/slack-notification.yml
    secrets: inherit
    with:
      status:        ${{ needs.test.result }}
      tests_total:   ${{ needs.test.outputs.tests_total }}
      tests_passed:  ${{ needs.test.outputs.tests_passed }}
      tests_failed:  ${{ needs.test.outputs.tests_failed }}
      tests_skipped: ${{ needs.test.outputs.tests_skipped }}
      passed_tests:  ${{ needs.test.outputs.passed_tests }}
      failed_tests:  ${{ needs.test.outputs.failed_tests }}

  #  Email Notification Job
  notify-email:
    needs: test
    if: always()
    uses: ./.github/workflows/email-notification.yml
    secrets: inherit
    with:
      status:        ${{ needs.test.result }}
      tests_total:   ${{ needs.test.outputs.tests_total }}
      tests_passed:  ${{ needs.test.outputs.tests_passed }}
      tests_failed:  ${{ needs.test.outputs.tests_failed }}
      tests_skipped: ${{ needs.test.outputs.tests_skipped }}
      passed_tests:  ${{ needs.test.outputs.passed_tests }}
      failed_tests:  ${{ needs.test.outputs.failed_tests }}