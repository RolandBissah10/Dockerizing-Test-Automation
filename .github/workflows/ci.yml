name: Swag Labs Selenium Tests (Docker)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Build & Run Containerized Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            --tag swag-labs-tests:${{ github.sha }} \
            --tag swag-labs-tests:latest \
            .

      # 3. Run tests in container
      #
      # Key flags explained:
      # --shm-size=2g         → Gives Chrome enough shared memory to run without crashing.
      #                         Docker's default is only 64MB — Chrome needs ~2GB to be stable.
      #                         This is the #1 fix for SessionNotCreatedException in CI.
      #
      # --name test-run       → Names the container so we can copy reports from it in step 4.
      #
      # || true               → Prevents the pipeline from stopping here if tests fail,
      #                         so we still extract reports and publish results.
      - name: Run test suite in container
        run: |
          docker run \
            --name test-run \
            --shm-size=2g \
            swag-labs-tests:latest || true

      # 4. Copy Surefire reports out of the stopped container
      - name: Extract test reports
        if: always()
        run: |
          docker cp test-run:/app/target/surefire-reports ./surefire-reports || true
          docker rm test-run || true

      # 5. Publish results as a GitHub Check (shows pass/fail per test)
      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'surefire-reports/TEST-*.xml'
          check_name: JUnit Test Results
          fail_on_failure: true

      # 6. Upload reports as a downloadable artifact (keeps for 14 days)
      - name: Upload Surefire reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-${{ github.sha }}
          path: surefire-reports/
          retention-days: 14